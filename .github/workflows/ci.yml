name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Cache Nix store
        uses: actions/cache@v4
        with:
          path: /nix/store
          key: nix-${{ runner.os }}-${{ hashFiles('flake.lock', 'flake.nix') }}
          restore-keys: nix-${{ runner.os }}-

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            pool/target
          key: cargo-${{ runner.os }}-${{ hashFiles('pool/Cargo.lock') }}
          restore-keys: cargo-${{ runner.os }}-

      - run: nix develop --command just check

  unit:
    name: Unit tests
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Cache Nix store
        uses: actions/cache@v4
        with:
          path: /nix/store
          key: nix-${{ runner.os }}-${{ hashFiles('flake.lock', 'flake.nix') }}
          restore-keys: nix-${{ runner.os }}-

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            pool/target
          key: cargo-${{ runner.os }}-${{ hashFiles('pool/Cargo.lock') }}
          restore-keys: cargo-${{ runner.os }}-

      - run: nix develop --command just unit

  integration:
    name: Integration tests
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Cache Nix store
        uses: actions/cache@v4
        with:
          path: /nix/store
          key: nix-${{ runner.os }}-${{ hashFiles('flake.lock', 'flake.nix') }}
          restore-keys: nix-${{ runner.os }}-

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            pool/target
          key: cargo-${{ runner.os }}-${{ hashFiles('pool/Cargo.lock') }}
          restore-keys: cargo-${{ runner.os }}-

      - run: nix develop --command just int
